name: ec2-pipeline
on: workflow_dispatch

jobs:
  build-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: get pem file
        run: |
          echo "${{secrets.secretkey}}" > key.pem
          chmod 400 key.pem
          
      - name: copy app.py
        run: scp -o StrictHostKeyChecking= no -i key.pem app.py ec2-user@43.204.232.8:/home/ec2-user/

      - name: copy requirements.txt
        run: scp -o StrictHostKeyChecking= no -i key.pem requirements.txt ec2-user@43.204.232.8:/home/ec2-user/

      - name: run application
        run: ssh -o StrictHostKeyChecking= no -i key.pem app.py ec2-user@43.204.232.8 "cd/home/ec2-user/ && python3 -m venv virtualenv && source virtualenv/bin/activate && pip3 install -r requirements.txt && python3 app.py"
